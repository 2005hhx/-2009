<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>铱诺铱诺法法法</title>
  <style>
    :root {
      --bg1: #fff1f6;
      --bg2: #ffe6f0;
      --card: #ffffff;
      --text: #3a2d33;
      --muted: #8a6d79;
      --accent: #ff6fa3;
      --shadow: 0 10px 30px rgba(255, 111, 163, 0.18);
      --radius: 22px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", sans-serif;
      color: var(--text);
      background: linear-gradient(135deg, var(--bg1), var(--bg2));
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .wrap {
      width: min(980px, 100%);
      background: rgba(255, 255, 255, 0.74);
      backdrop-filter: blur(6px);
      border-radius: 28px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255, 255, 255, 0.7);
      padding: 26px;
    }

    .title {
      text-align: center;
      font-size: clamp(22px, 3vw, 34px);
      font-weight: 800;
      letter-spacing: 1px;
      margin-bottom: 20px;
      color: var(--accent);
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: 0 8px 25px rgba(60, 34, 49, 0.08);
      border: 1px solid #ffe3ef;
      transition: transform 0.25s ease;
    }

    .card:hover {
      transform: translateY(-4px);
    }

    .photo {
      width: 100%;
      aspect-ratio: 4 / 5;
      object-fit: cover;
      border-radius: 16px;
      display: block;
      background: #ffeaf3;
    }

    .name {
      text-align: center;
      margin-top: 12px;
      font-size: clamp(20px, 2.2vw, 28px);
      font-weight: 700;
    }

    .sub {
      margin-top: 6px;
      text-align: center;
      font-size: 14px;
      color: var(--muted);
    }

    @media (max-width: 720px) {
      .cards {
        grid-template-columns: 1fr;
      }
    }

    .photo.clickable {
      cursor: pointer;
      user-select: none;
    }

    #fx-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      overflow: hidden;
    }

    .fx-heart {
      position: absolute;
      left: 0;
      top: 0;
      font-size: clamp(18px, 4.2vw, 30px);
      line-height: 1;
      color: #ff3d7a;
      text-shadow: 0 2px 8px rgba(255, 61, 122, 0.45);
      will-change: transform, opacity;
      animation-name: fxHeartBurst;
      animation-timing-function: cubic-bezier(0.22, 1, 0.36, 1);
      animation-fill-mode: forwards;
    }

    @keyframes fxHeartBurst {
      0% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(0.35) rotate(var(--spin0, 0deg));
      }
      18% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1.05) rotate(calc(var(--spin0, 0deg) + 12deg));
      }
      100% {
        opacity: 0;
        transform: translate(
            calc(-50% + var(--tx, 0px)),
            calc(-50% + var(--ty, 0px))
          )
          scale(1.25)
          rotate(var(--spin1, 360deg));
      }
    }

    .fx-bone {
      position: absolute;
      left: 0;
      top: 0;
      width: clamp(28px, 7vw, 44px);
      height: clamp(28px, 7vw, 44px);
      object-fit: contain;
      filter: drop-shadow(0 2px 6px rgba(90, 70, 40, 0.35));
      will-change: transform, opacity;
      animation-name: fxBoneBurst;
      animation-timing-function: cubic-bezier(0.2, 0.9, 0.2, 1);
      animation-fill-mode: forwards;
    }

    @keyframes fxBoneBurst {
      0% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(0.4) rotate(var(--spin0, 0deg));
      }
      55% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: translate(
            calc(-50% + var(--tx, 0px)),
            calc(-50% + var(--ty, 0px))
          )
          scale(1.05)
          rotate(var(--spin1, -260deg));
      }
    }

    #access-gate {
      position: fixed;
      inset: 0;
      z-index: 10050;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: linear-gradient(145deg, rgba(255, 241, 246, 0.96), rgba(255, 230, 240, 0.98));
      backdrop-filter: blur(8px);
    }

    #access-gate.hidden {
      display: none;
    }

    .gate-panel {
      width: min(400px, 100%);
      background: var(--card);
      border-radius: var(--radius);
      padding: 28px 24px 26px;
      box-shadow: var(--shadow);
      border: 1px solid #ffe3ef;
    }

    .gate-panel h2 {
      font-size: 1.25rem;
      font-weight: 800;
      color: var(--accent);
      text-align: center;
      margin-bottom: 8px;
    }

    .gate-panel p {
      text-align: center;
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 18px;
    }

    .gate-panel label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .gate-panel input[type="password"] {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid #ffd6e8;
      font-size: 16px;
      font-family: inherit;
      color: var(--text);
      background: #fffafd;
    }

    .gate-panel input[type="password"]:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(255, 111, 163, 0.25);
    }

    .gate-panel button[type="submit"] {
      width: 100%;
      margin-top: 16px;
      padding: 12px 16px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      font-family: inherit;
      color: #fff;
      background: linear-gradient(135deg, #ff7eb3, var(--accent));
      cursor: pointer;
      box-shadow: 0 6px 18px rgba(255, 111, 163, 0.35);
    }

    .gate-panel button[type="submit"]:hover {
      filter: brightness(1.05);
    }

    .gate-err {
      min-height: 1.25em;
      margin-top: 10px;
      text-align: center;
      font-size: 14px;
      color: #d92653;
    }
  </style>
</head>
<body>
  <div id="fx-layer" aria-hidden="true"></div>
  <main class="wrap">
    <h1 class="title">法哭大赛（究竟谁！能法爆对面？）</h1>

    <section class="cards">
      <article class="card">
        <img id="photo-owner" class="photo clickable" src="owner.JPG" alt="主人照片" />
        <p class="name">主人</p>
        <p class="sub">选择本尊 · 点击增加好感</p>
      </article>

      <article class="card">
        <img id="photo-pet" class="photo clickable" src="pet.jpg" alt="宠物照片" />
        <p class="name">宠物</p>
        <p class="sub">选择星怒 · 点击飞出骨头</p>
      </article>
    </section>
  </main>

  <div id="access-gate" role="dialog" aria-modal="true" aria-labelledby="gate-title">
    <div class="gate-panel">
      <h2 id="gate-title">星怒验证</h2>
      <p>请输入密码后继续浏览</p>
      <form id="access-form" autocomplete="off">
        <label for="access-pass">密码</label>
        <input id="access-pass" name="access-pass" type="password" inputmode="numeric" maxlength="32" required />
        <button type="submit">进入</button>
        <p id="access-err" class="gate-err" aria-live="polite"></p>
      </form>
    </div>
  </div>

  <script>
    (function () {
      var ACCESS_PASSWORD = "20090117";
      var STORAGE_KEY = "couple_page_access";

      var gate = document.getElementById("access-gate");
      var form = document.getElementById("access-form");
      var input = document.getElementById("access-pass");
      var errEl = document.getElementById("access-err");

      function unlockGate() {
        try {
          sessionStorage.setItem(STORAGE_KEY, "1");
        } catch (e) {}
        gate.classList.add("hidden");
        gate.setAttribute("aria-hidden", "true");
      }

      if (sessionStorage.getItem(STORAGE_KEY) === "1") {
        unlockGate();
      } else {
        input.focus();
      }

      form.addEventListener("submit", function (ev) {
        ev.preventDefault();
        errEl.textContent = "";
        if (input.value === ACCESS_PASSWORD) {
          unlockGate();
        } else {
          errEl.textContent = "密码错误，请重试 生日都记不住你个蠢猪";
          input.select();
        }
      });
    })();
  </script>

  <script>
    (function () {
      const layer = document.getElementById("fx-layer");
      const ownerImg = document.getElementById("photo-owner");
      const petImg = document.getElementById("photo-pet");

      const BONE_SRC =
        "data:image/svg+xml," +
        encodeURIComponent(
          '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 28" role="img" aria-label="bone">' +
            '<ellipse cx="11" cy="14" rx="9" ry="11" fill="#f7eedc" stroke="#b8955c" stroke-width="2"/>' +
            '<rect x="11" y="7" width="42" height="14" rx="6" fill="#f7eedc" stroke="#b8955c" stroke-width="2"/>' +
            '<ellipse cx="53" cy="14" rx="9" ry="11" fill="#f7eedc" stroke="#b8955c" stroke-width="2"/>' +
            "</svg>"
        );

      function rand(min, max) {
        return min + Math.random() * (max - min);
      }

      function spawnAtViewport(x, y, el) {
        el.style.left = x + "px";
        el.style.top = y + "px";
        layer.appendChild(el);
        const ms = parseFloat(getComputedStyle(el).animationDuration) * 1000 || 2500;
        window.setTimeout(function () {
          el.remove();
        }, ms + 80);
      }

      function burstHearts(clientX, clientY) {
        const count = Math.floor(rand(42, 58));
        const duration = rand(2.6, 3.4);

        for (let i = 0; i < count; i++) {
          const h = document.createElement("span");
          h.className = "fx-heart";
          h.textContent = "❤";
          const angle = (Math.PI * 2 * i) / count + rand(-0.35, 0.35);
          const dist = rand(110, 320);
          const tx = Math.cos(angle) * dist + rand(-22, 22);
          const ty = Math.sin(angle) * dist + rand(-40, 40) - rand(0, 70);
          const spin0 = rand(-25, 25);
          const spin1 = spin0 + rand(-220, 220);
          h.style.setProperty("--tx", tx.toFixed(1) + "px");
          h.style.setProperty("--ty", ty.toFixed(1) + "px");
          h.style.setProperty("--spin0", spin0.toFixed(1) + "deg");
          h.style.setProperty("--spin1", spin1.toFixed(1) + "deg");
          h.style.animationDuration = duration.toFixed(2) + "s";
          h.style.animationDelay = rand(0, 0.12).toFixed(3) + "s";
          spawnAtViewport(clientX, clientY, h);
        }
      }

      function burstBones(clientX, clientY) {
        const count = Math.floor(rand(38, 52));
        const duration = rand(2.0, 3.0);

        for (let i = 0; i < count; i++) {
          const b = document.createElement("img");
          b.className = "fx-bone";
          b.src = BONE_SRC;
          b.alt = "";
          const angle = Math.random() * Math.PI * 2;
          const dist = rand(90, 280);
          const tx = Math.cos(angle) * dist + rand(-26, 26);
          const ty = Math.sin(angle) * dist + rand(-30, 30) - rand(0, 55);
          const spin0 = rand(-40, 40);
          const spin1 = spin0 + rand(-300, 300);
          b.style.setProperty("--tx", tx.toFixed(1) + "px");
          b.style.setProperty("--ty", ty.toFixed(1) + "px");
          b.style.setProperty("--spin0", spin0.toFixed(1) + "deg");
          b.style.setProperty("--spin1", spin1.toFixed(1) + "deg");
          b.style.animationDuration = duration.toFixed(2) + "s";
          b.style.animationDelay = rand(0, 0.1).toFixed(3) + "s";
          spawnAtViewport(clientX, clientY, b);
        }
      }

      function clientPointFromEvent(ev, el) {
        const r = el.getBoundingClientRect();
        if (ev.type === "touchstart" || ev.type === "touchend") {
          const t = ev.changedTouches && ev.changedTouches[0];
          if (t) {
            return { x: t.clientX, y: t.clientY };
          }
        }
        if (typeof ev.clientX === "number" && typeof ev.clientY === "number") {
          return { x: ev.clientX, y: ev.clientY };
        }
        return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
      }

      const lastBurst = new WeakMap();

      function bindBurst(el, fn) {
        function handler(ev) {
          ev.preventDefault();
          const now = performance.now();
          const prev = lastBurst.get(el) || 0;
          if (now - prev < 320) {
            return;
          }
          lastBurst.set(el, now);
          const p = clientPointFromEvent(ev, el);
          fn(p.x, p.y);
        }
        el.addEventListener("click", handler, { passive: false });
        el.addEventListener(
          "touchend",
          function (ev) {
            handler(ev);
          },
          { passive: false }
        );
      }

      bindBurst(ownerImg, burstHearts);
      bindBurst(petImg, burstBones);
    })();
  </script>
</body>
</html>
